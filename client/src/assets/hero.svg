<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#0f172a" />

  <g transform="translate(0,40)">
    <ellipse cx="260" cy="360" rx="320" ry="140" fill="#07203a" opacity="0.6"/>
    <ellipse cx="920" cy="260" rx="360" ry="160" fill="#0b1220" opacity="0.5"/>

    <g filter="url(#soft)">
      <circle cx="220" cy="200" r="120" fill="url(#grad)" opacity="0.18"/>
      <circle cx="960" cy="160" r="160" fill="#10b981" opacity="0.12"/>
    </g>

    <g transform="translate(80,120)" fill="#fff" font-family="Inter, Arial, sans-serif">
      <text x="0" y="0" font-size="56" font-weight="700">Helping Hands</text>
      <text x="0" y="54" font-size="20" opacity="0.9">Connect. Serve. Empower communities.</text>
    </g>

    <g transform="translate(760,120)" fill="#fff" opacity="0.95">
      <rect x="0" y="0" width="320" height="200" rx="16" fill="#ffffff" opacity="0.06"/>
      <path d="M40 120c10-28 38-48 70-48s60 20 70 48v24H40v-24z" fill="#fff" opacity="0.06"/>
      <g transform="translate(32,28)" fill="#fff">
        <circle cx="48" cy="48" r="40" fill-opacity="0.12"/>
        <path d="M34 64c0-14 11-26 26-26s26 12 26 26-11 26-26 26-26-12-26-26z" fill="#fff"/>
      </g>
    </g>
  </g>
</svg>
